name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select the newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build
        run: |
          xcodebuild \
            -project FusionNotch.xcodeproj \
            -scheme FusionNotch \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build

      - name: Check the hook helper got embedded
        run: test -x "build/Build/Products/Debug/FusionNotch.app/Contents/Helpers/OpenIslandHooks"

      - name: Smoke-test the launch
        run: .github/scripts/smoke-test.sh "build/Build/Products/Debug/FusionNotch.app"
