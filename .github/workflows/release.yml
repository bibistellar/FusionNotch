name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select the newest Xcode
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version

      - name: Resolve the version from the tag
        id: version
        run: |
          # The input wins. On workflow_dispatch, GITHUB_REF_NAME is the *branch* — so
          # falling back to it the other way round tags the release "main".
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "refusing to release '$TAG': tags must look like v1.2.3"; exit 1 ;;
          esac
          VERSION="${TAG#v}"
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $VERSION
          EOF
          # CFBundleVersion is what Sparkle compares, and it must keep climbing. Builds
          # already in the wild carry upstream's 271, so anything derived from our own
          # 0.1.x numbering has to clear that bar — hence the 1_000_000 floor.
          BUILD=$(( 1000000 + MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "releasing $TAG as $VERSION (build $BUILD)"

      # Ad-hoc signing makes the app's designated requirement a cdhash — a hash of that
      # exact binary. TCC records the requirement when the user grants a permission, so
      # every new build looks like a different app and silently loses Accessibility and
      # Apple Events: the toggle stays on in System Settings while the app keeps asking.
      # A stable (if self-signed) certificate makes the requirement `certificate root =
      # H"..."`, which survives every rebuild and every Sparkle update.
      - name: Import the signing certificate
        id: signing
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PEM: ${{ secrets.SIGNING_CERT_PEM }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "$SIGNING_CERT_P12" ] || [ -z "$SIGNING_CERT_PEM" ]; then
            echo "SIGNING_CERT_P12 is not set. A build signed ad-hoc would drop every"
            echo "user's Accessibility grant on update, so refuse to ship one."
            exit 1
          fi

          KEYCHAIN="$RUNNER_TEMP/fusionnotch.keychain"
          echo "$SIGNING_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p ci "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          # codesign will not use a certificate it does not trust for code signing, and a
          # self-signed one is not trusted by default.
          #
          # The certificate is carried as its own secret rather than extracted from the
          # p12: macOS's LibreSSL writes p12 files with RC2-40-CBC, which OpenSSL 3 on the
          # runner refuses to touch as a legacy algorithm. It is only the public half, so
          # there is nothing to protect by keeping it inside the archive.
          printf '%s\n' "$SIGNING_CERT_PEM" > "$RUNNER_TEMP/cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.pem"

          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.pem"

          security find-identity -v -p codesigning "$KEYCHAIN"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

      - name: Build (Release)
        run: |
          xcodebuild \
            -project FusionNotch.xcodeproj \
            -scheme FusionNotch \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="FusionNotch Self-Signed" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.signing.outputs.keychain }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" \
            build

      - name: Verify the bundle
        run: |
          APP="build/Build/Products/Release/FusionNotch.app"
          # The hook binary is what feeds the Agents tab; a bundle without it builds
          # fine and then silently shows an empty panel forever.
          test -x "$APP/Contents/Helpers/OpenIslandHooks"
          codesign --verify --strict "$APP"
          codesign -d --entitlements - "$APP" 2>/dev/null | grep -q apple-events
          # The certificate carries no Team ID, which Library Validation reads as a
          # mismatch against the app's own frameworks. See smoke-test.sh.
          codesign -d --entitlements - "$APP" 2>/dev/null | grep -q disable-library-validation
          # The whole point of signing with a real certificate: the requirement must be
          # anchored to it, not to this build's cdhash, or every update resets TCC.
          codesign -d -r- "$APP" 2>&1 | grep -q 'certificate root'

      - name: Smoke-test the launch
        run: .github/scripts/smoke-test.sh "build/Build/Products/Release/FusionNotch.app"

      - name: Package
        id: package
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # ditto, not `zip`: it is the only archiver that preserves the code signature.
          ditto -c -k --keepParent \
            "build/Build/Products/Release/FusionNotch.app" \
            "FusionNotch-$TAG.zip"
          shasum -a 256 "FusionNotch-$TAG.zip"
          echo "size=$(stat -f %z "FusionNotch-$TAG.zip")" >> "$GITHUB_OUTPUT"

      - name: Sign the archive for Sparkle
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY is not set — an unsigned appcast would be ignored"
            echo "by every client, so fail here rather than ship a dead update feed."
            exit 1
          fi
          SIGN_UPDATE=$(find build/SourcePackages/artifacts -name sign_update -type f | head -1)
          test -x "$SIGN_UPDATE"

          printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle.key
          SIG=$("$SIGN_UPDATE" "FusionNotch-${{ steps.version.outputs.tag }}.zip" -f /tmp/sparkle.key -p)
          rm -f /tmp/sparkle.key

          test -n "$SIG"
          echo "signature=$SIG" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Idempotent: a re-run, or a tag push after a manual dispatch, must refresh the
          # release rather than die on "a release with the same tag name already exists".
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "FusionNotch-$TAG.zip" --clobber
            gh release edit "$TAG" \
              --title "FusionNotch $TAG" \
              --notes-file .github/RELEASE_NOTES.md
          else
            gh release create "$TAG" "FusionNotch-$TAG.zip" \
              --title "FusionNotch $TAG" \
              --notes-file .github/RELEASE_NOTES.md
          fi

      # Sparkle reads this file straight from the default branch, so the appcast has to
      # land on main — not on the tag this workflow was built from.
      - name: Publish the appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          SIZE="${{ steps.package.outputs.size }}"
          SIG="${{ steps.sign.outputs.signature }}"
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/FusionNotch-$TAG.zip"
          DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          git fetch origin main
          git checkout -B main origin/main

          python3 .github/scripts/update-appcast.py \
            --version "$VERSION" \
            --build "$BUILD" \
            --url "$URL" \
            --length "$SIZE" \
            --signature "$SIG" \
            --date "$DATE" \
            --notes "https://github.com/${{ github.repository }}/releases/tag/$TAG"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first, then compare the index. `git diff --quiet <path>` reports no
          # change for an *untracked* file, so testing the worktree would skip the very
          # first appcast — greenly, having published nothing.
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast already up to date"
            exit 0
          fi

          git commit -m "chore: publish $TAG to the appcast [skip ci]"
          git push origin main

          test -s appcast.xml
          grep -q "FusionNotch-$TAG.zip" appcast.xml
